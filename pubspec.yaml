name: innolab_application

description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8
  
  # PACKAGES
dependencies:
  flutter:
    sdk: flutter

# UTILITY PACKAGES
  http: ^1.6.0
  intl: ^0.20.2
  logger: ^1.1.0
  url_launcher: ^6.1.7 

# ICONS
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

# STATE MANAGEMENT
  get: ^4.7.3
  get_storage: ^2.0.3
  google_fonts: ^8.0.2

# PRODUCT SPECIFIC PACKAGES


  provider: ^6.0.5

# PACKAGES END

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# LOCAL ASSETS
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/




